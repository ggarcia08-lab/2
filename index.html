<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas - Tamanduá Bandeira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cor-fundo: #1a1a1a;
            --cor-container: #2d2d2d;
            --cor-primaria: #ff4500; /* Laranja Grafite */
            --cor-secundaria: #00ffcc; /* Neon para contraste */
            --cor-texto: #ffffff;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1602491453631-e2a5ad90a131?q=80&w=1200'); /* Exemplo de foto de fundo (textura/natureza) */
            background-size: cover;
            background-attachment: fixed;
        }

        /* Estilização do Título Temático (Grafite e Letras Esticadas) */
        .titulo-grafite {
            font-family: 'Rubik Glitch', 'Permanent Marker', cursive;
            font-size: 2.5rem;
            text-align: center;
            color: var(--cor-primaria);
            text-shadow: 3px 3px 0px var(--cor-secundaria), -1px -1px 0px #000;
            margin-bottom: 30px;
            letter-spacing: 2px;
            /* Efeito de esticar as letras verticalmente */
            transform: scaleY(1.3);
            text-transform: uppercase;
        }

        .container {
            background-color: var(--cor-container);
            border: 4px solid var(--cor-primaria);
            box-shadow: 5px 5px 0px var(--cor-secundaria);
            border-radius: 10px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        /* Espaço para as Imagens/Desenhos do Tamanduá */
        .tamandua-gallery {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .tamandua-img {
            width: 45%;
            height: 120px;
            object-fit: cover;
            border: 2px solid var(--cor-texto);
            border-radius: 5px;
            background-color: #444;
        }

        .campo-senha {
            background-color: #111;
            border: 2px solid var(--cor-secundaria);
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 5px;
            margin-bottom: 20px;
            word-break: break-all;
            text-align: center;
            min-height: 30px;
            font-family: monospace;
            color: #fff;
        }

        .controle-grupo {
            margin-bottom: 15px;
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--cor-primaria);
        }

        input[type="checkbox"] {
            accent-color: var(--cor-secundaria);
            width: 18px;
            height: 18px;
        }

        .btn {
            width: 100%;
            background-color: var(--cor-primaria);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-family: 'Permanent Marker', cursive;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            transition: 0.2s;
            box-shadow: 3px 3px 0px #000;
        }

        .btn:hover {
            background-color: #cc3700;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px #000;
        }

        .btn:active {
            transform: translate(0px, 0px);
            box-shadow: 1px 1px 0px #000;
        }
    </style>
</head>
<body>

    <h1 class="titulo-grafite">seja bem-vindo ao meu site de gerador de senhas</h1>

    <div class="container">
        <div class="tamandua-gallery">
            <img class="tamandua-img" src="https://images.unsplash.com/photo-1590673909774-7ea6f204ffdf?q=80&w=300" alt="Foto Tamanduá Bandeira">
            <img class="tamandua-img" src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=300" alt="Desenho/Arte Tamanduá">
        </div>

        <div class="campo-senha" id="senhaExibida">Clique em Gerar Senha</div>

        <div class="controle-grupo">
            <label>Comprimento: <span id="tamanhoValor">16</span> caracteres</label>
            <input type="range" id="tamanho" min="12" max="32" value="16">
        </div>

        <div class="controle-grupo">
            <label>
                Incluir Maiúsculas (A-Z)
                <input type="checkbox" id="maiusculas" checked>
            </label>
        </div>

        <div class="controle-grupo">
            <label>
                Incluir Minúsculas (a-z)
                <input type="checkbox" id="minusculas" checked>
            </label>
        </div>

        <div class="controle-grupo">
            <label>
                Incluir Números (0-9)
                <input type="checkbox" id="numeros" checked>
            </label>
        </div>

        <div class="controle-grupo">
            <label>
                Incluir Símbolos (!@#$...)
                <input type="checkbox" id="simbolos" checked>
            </label>
        </div>

        <button class="btn" id="btnGerar">Gerar Senha Forte</button>
    </div>

    <script>
        // Mapeamento dos elementos do DOM
        const tamanhoInput = document.getElementById('tamanho');
        const tamanhoValor = document.getElementById('tamanhoValor');
        const maiusculasInput = document.getElementById('maiusculas');
        const minusculasInput = document.getElementById('minusculas');
        const numerosInput = document.getElementById('numeros');
        const simbolosInput = document.getElementById('simbolos');
        const senhaExibida = document.getElementById('senhaExibida');
        const btnGerar = document.getElementById('btnGerar');

        // Atualiza o texto do tamanho dinamicamente
        tamanhoInput.addEventListener('input', () => {
            tamanhoValor.textContent = tamanhoInput.value;
        });

        // Dicionário de caracteres
        const caracteres = {
            maiusculas: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            minusculas: 'abcdefghijklmnopqrstuvwxyz',
            numeros: '0123456789',
            simbolos: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        // Função de geração segura usando a API Web Crypto
        function geradorSenhaSegura() {
            let bancoDeDados = '';
            if (maiusculasInput.checked) bancoDeDados += caracteres.maiusculas;
            if (minusculasInput.checked) bancoDeDados += caracteres.minusculas;
            if (numerosInput.checked) bancoDeDados += caracteres.numeros;
            if (simbolosInput.checked) bancoDeDados += caracteres.simbolos;

            if (bancoDeDados === '') {
                senhaExibida.textContent = 'Selecione ao menos uma opção!';
                senhaExibida.style.color = '#ff0000';
                return;
            }

            senhaExibida.style.color = 'var(--cor-secundaria)';
            let senhaFinal = '';
            const tamanho = parseInt(tamanhoInput.value);

            // Boa prática de segurança: Usar Uint32Array com crypto para entropia real
            const valoresAleatorios = new Uint32Array(tamanho);
            window.crypto.getRandomValues(valoresAleatorios);

            for (let i = 0; i < tamanho; i++) {
                // Modulo do número aleatório pelo tamanho do banco para escolher o caractere
                const indice = valoresAleatorios[i] % bancoDeDados.length;
                senhaFinal += bancoDeDados.charAt(indice);
            }

            senhaExibida.textContent = senhaFinal;
        }

        btnGerar.addEventListener('click', geradorSenhaSegura);
        
        // Gera uma senha inicial ao carregar a página
        window.onload = geradorSenhaSegura;
    </script>
</body>
</html>
